<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Match Game</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background-color: rgb(90, 198, 228);
}

#container {
  display: grid;
  grid-template-columns: repeat(4, 100px);
  gap: 12px;
  justify-content: center;
  margin-top: 20px;
}

.box {
  width: 100px;
  height: 100px;
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

/* animal image */
.animal {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
}

/* cover (FIXED) */
.cover {
  position: absolute;
  width: 100%;
  height: 100%;
  background-color: rgb(167, 227, 177); /* green background */
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2;
}

/* clover icon */
.cover img {
  width: 60%;
  height: 60%;
  object-fit: contain;
}

/* buttons */
button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
}

/* WIN SCREEN */
#winScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
  font-size: 40px;
  opacity: 0;
  pointer-events: none;
  transition: 0.5s;
}

#winScreen.show {
  opacity: 1;
  pointer-events: all;
}

#replayBtn {
  font-size: 20px;
  padding: 12px 25px;
  background: orange;
  border: none;
  border-radius: 8px;
  margin-top: 455px;
}

#replayBtn:hover {
  background: gold;
}

/* CONFETTI */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: -10px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<h1>Flip Game</h1>
<h2>MATCH ALL CARDS TO WIN</h2>

<div id="container"></div>

<div>
  <button id="startBtn">Start</button>
  <button id="restartBtn">Restart</button>
</div>

<!-- WIN SCREEN -->
<div id="winScreen">
  <div>🎉 You Win! 🎉</div>
  <button id="replayBtn">Replay</button>
</div>

<script>
const dataArray = [
  {value:'A',src:'dog.jpeg'},
  {value:'B',src:'cat.jpeg'},
  {value:'C',src:'lion.jpeg'},
  {value:'D',src:'tiger.jpeg'},
  {value:'E',src:'ant.jpeg'},
  {value:'F',src:'fish.jpeg'},
  {value:'G',src:'shark.jpeg'},
  {value:'H',src:'bee.jpeg'}
];

let container = document.getElementById("container");

let firstBox = null;
let secondBox = null;
let lockBoard = false;

let matchedPairs = 0;
const totalPairs = dataArray.length;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function generateGrid() {
  container.innerHTML = "";
  firstBox = null;
  secondBox = null;
  lockBoard = false;

  matchedPairs = 0;
  document.getElementById("winScreen").classList.remove("show");

  let gridArray = shuffle([...dataArray, ...dataArray]);

  gridArray.forEach(item => {
    let box = document.createElement("div");
    box.className = "box";
    box.dataset.value = item.value;

    // animal image
    let animal = document.createElement("img");
    animal.src = item.src;
    animal.className = "animal";

    // cover div
    let cover = document.createElement("div");
    cover.className = "cover";

    // clover image inside cover
    let clover = document.createElement("img");
    clover.src = "clover.png";

    cover.appendChild(clover);

    box.appendChild(animal);
    box.appendChild(cover);

    box.addEventListener("click", () => {
      if(lockBoard || cover.style.display === "none") return;

      cover.style.display = "none";

      if(!firstBox) {
        firstBox = box;
      } else {
        secondBox = box;
        lockBoard = true;

        if(firstBox.dataset.value === secondBox.dataset.value) {
          matchedPairs++;

          setTimeout(() => {
            reset();

            if(matchedPairs === totalPairs) {
              showWin();
            }

          }, 400);

        } else {
          setTimeout(() => {
            firstBox.querySelector(".cover").style.display = "flex";
            secondBox.querySelector(".cover").style.display = "flex";
            reset();
          }, 700);
        }
      }
    });

    container.appendChild(box);
  });
}

function reset() {
  firstBox = null;
  secondBox = null;
  lockBoard = false;
}

function showWin() {
  const winScreen = document.getElementById("winScreen");
  winScreen.classList.add("show");

  for(let i = 0; i < 120; i++) {
    let c = document.createElement("div");
    c.className = "confetti";

    c.style.left = Math.random()*100 + "vw";
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration = (Math.random()*2 + 2) + "s";

    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

// buttons
document.getElementById("startBtn").onclick = generateGrid;
document.getElementById("restartBtn").onclick = generateGrid;
document.getElementById("replayBtn").onclick = generateGrid;

</script>

</body>
</html>
