<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Match Game with Timer</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background-color: rgb(90, 198, 228);
}

h2 {
  margin-top: 20px;
}

#container {
  display: grid;
  grid-template-columns: repeat(4, 100px);
  gap: 10px;
  justify-content: center;
  margin-top: 20px;
}

.box {
  width: 100px;
  height: 100px;
  border: 2px solid rgb(255, 255, 255);
  
  position: relative;
  cursor: pointer;
}

.box img {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
  background-color: rgb(167, 227, 177);
}

.animal {
  z-index: 1;
  zoom: 5;
}

.cover {
  z-index: 2;
}

#buttons {
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  margin: 5px;
  border-radius: 10;
}

#timer {
  font-size: 18px;
  margin-top: 10px;
  color: rgb(255, 255, 255);
}
</style>
</head>

<body>

<h1>Flip Game</h1>
<h2>MATCH ALL CARDS TO WIN</h2>


<div id="timer"></div>
<div id="container"></div>

<div id="buttons">
  <button id="startBtn">Start</button>
  <button id="restartBtn">Restart</button>
</div>

<script>
const dataArray = [
  {id:1,value:'A',src:'dog.jpeg'},
  {id:2,value:'B',src:'cat.jpeg'},
  {id:3,value:'C',src:'lion.jpeg'},
  {id:4,value:'D',src:'tiger.jpeg'},
  {id:5,value:'E',src:'ant.jpeg'},
  {id:6,value:'F',src:'fish.jpeg'},
  {id:7,value:'G',src:'shark.jpeg'},
  {id:8,value:'H',src:'bee.jpeg'}
];

let gridArray = [];
let container = document.getElementById("container");


let timerDiv = document.getElementById("timer");

let firstBox = null;
let secondBox = null;
let lockBoard = false;


let countdownInterval = null;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function generateGrid() 
{
  container.innerHTML = "";
  timerDiv.innerHTML = ""; 
  firstBox = null;
  secondBox = null;
  lockBoard = false;

  
  gridArray = shuffle([...dataArray, ...dataArray]);

  gridArray.forEach(item => {
    let box = document.createElement("div");
    box.className = "box";
    box.dataset.value = item.value;

    let animalImg = document.createElement("img");
    animalImg.src = item.src;
    animalImg.className = "animal";

    let coverImg = document.createElement("img");
    coverImg.src = "clover.png";
    coverImg.className = "cover";

    box.appendChild(animalImg);
    box.appendChild(coverImg);
    
    box.addEventListener("click", () => {
      if(lockBoard) return;
      if(coverImg.style.display === "none") return;

      coverImg.style.display = "none";

      if(!firstBox) {
        firstBox = box;
      } else {
        secondBox = box;
        lockBoard = true;

        let firstValue = firstBox.dataset.value;
        let secondValue = secondBox.dataset.value;

        if(firstValue === secondValue) {
          
          setTimeout(() => {
            //firstBox.style.border = "4px solid yellow";
            //secondBox.style.border = "4px solid yellow";
            resetSelection();
          }, 500);
        } else {
             let countdown = 0.8; 

          
          countdownInterval = setInterval(() => {
            countdown--;
            if(countdown > 0) {
            } else {
              clearInterval(countdownInterval);  
              timerDiv.textContent = ""; 

             
              firstBox.querySelector(".cover").style.display = "block";
              secondBox.querySelector(".cover").style.display = "block";
             document.getElementById("timer").textContent = "Try Again!";
              

              resetSelection();
            }
          }, 1000);
        }
      }
    });

    container.appendChild(box);
  });
}


function resetSelection() {
  firstBox = null;
  secondBox = null;
  lockBoard = false;
  clearInterval(countdownInterval); 
  timerDiv.textContent = "";
}

document.getElementById("startBtn").addEventListener("click", generateGrid);
document.getElementById("restartBtn").addEventListener("click", generateGrid);

</script>

</body>
</html>
